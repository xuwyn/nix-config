    scale = 1.5120406150817871
    type = "media_player"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000009.settings]
        background = false
        background_opacity = 0.68000000000000005
        hide_when_no_media = true
        layout = "horizontal"

[shell]
avatar_path = "/home/wyn/nixos/modules/home/hyprland/face.jpg"
date_format = "%A, %Y %b %d"
font_family = "Maple Mono NF"
launch_apps_as_systemd_services = true
settings_show_advanced = true
telemetry_enabled = false
ui_scale = 1.1000000000000001

    [shell.panel]
    control_center_placement = "floating"
    open_near_click_control_center = true
    session_placement = "centered"
    shadow = false
    transparency_mode = "glass"
    wallpaper_placement = "floating"

    [shell.screen_corners]
    enabled = true
    size = 40

    [shell.screenshot]
    directory = "/home/wyn/Pictures/Screenshots"

    [[shell.session.actions]]
    action = "lock"
    enabled = true
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    enabled = true
    glyph = "player-pause"
    label = "Suspend"
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "command"
    command = "systemctl reboot --firmware-setup"
    enabled = true
    glyph = "cpu"
    label = "BIOS Reboot"
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    enabled = true
    shortcut = "5"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true
    shortcut = "6"
    variant = "destructive"

    [shell.shadow]
    alpha = 0.0

[system.monitor]
cpu_poll_seconds = 1
network_poll_seconds = 1

[theme]
custom_palette = "m3-content"
source = "wallpaper"
wallpaper_scheme = "m3-fruit-salad"

    [theme.templates]
    builtin_ids = [ "btop", "cava", "hyprland", "kitty" ]
    community_ids = [ "discord" ]

[wallpaper]
directory = "/home/wyn/Pictures/Wallpapers"

    [wallpaper.default]
    path = "/home/wyn/Pictures/Wallpapers/interlude_109.png"

    [wallpaper.last]
    path = "/home/wyn/Pictures/Wallpapers/interlude_109.png"

    [wallpaper.monitors.DP-5]
    path = "/home/wyn/Pictures/Wallpapers/interlude_109.png"

[weather]
address = "Fredericton, CA"

[widget.audio_visualizer]
centered = false
width = 100.0

[widget.bongocat]
audio_spectrum = true
scale = 1.3
script = "scripts/bongocat.lua"
tappy_mode = true
type = "scripted"

[widget.media]
hide_when_no_media = true
title_scroll = "always"

[widget.network]
show_label = false

[widget.screen_recorder]
hot_reload = true
script = "scripts/screen_recorder.lua"
type = "scripted"
video_source = "DP-5"

[widget.sysmon]
stat = "disk_pct"

[widget.tray]
drawer = true
hidden = [ "network", "blueman" ]