[bar.default]
background_opacity = 0.69999999999999996
capsule = true
capsule_border = "primary"
capsule_foreground = "primary"
center = [ "clock", "audio_visualizer", "bongocat", "audio_visualizer", "group:g3" ]
end = [ "screen_recorder", "group:g1", "group:g2" ]
margin_edge = 0
margin_ends = 15
panel_overlap = 0
radius = 0
radius_bottom_left = 45
radius_bottom_right = 45
shadow = false
start = [ "workspaces", "media" ]

    [[bar.default.capsule_group]]
    border = "primary"
    fill = "surface_variant"
    foreground = "primary"
    id = "g1"
    members = [ "temp", "cpu", "ram", "sysmon" ]
    opacity = 1.0
    padding = 6.0

    [[bar.default.capsule_group]]
    border = "primary"
    fill = "surface_variant"
    foreground = "primary"
    id = "g2"
    members = [ "network", "bluetooth" ]
    opacity = 1.0
    padding = 6.0

    [[bar.default.capsule_group]]
    border = "primary"
    fill = "surface_variant"
    foreground = "primary"
    id = "g3"
    members = [ "tray", "notifications" ]
    opacity = 1.0
    padding = 6.0

[brightness]
enable_ddcutil = true

[control_center]
sidebar = "full"
sidebar_section = "none"

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "keyboard_layout"

[desktop_widgets]
schema_version = 1
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
auto_hide = true
background_opacity = 0.65000000000000002
enabled = true
icon_size = 35
inactive_opacity = 0.59999998658895493
item_spacing = 8
padding = 6
shadow = false
show_dots = true
show_instance_count = false

[hooks]
logging_out = "hyprctl dispatch exit"
started = "pkill openrgb; sleep 1; openrgb --startminimized --profile purple;"

[keybinds]
cancel = [ "Delete", "Escape" ]

[lockscreen_widgets]
enabled = false
schema_version = 1
widget_order = [ "lockscreen-login-box@DP-5" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-5"]
    cx = 960.0
    cy = 957.0
    output = "DP-5"
    rotation = 0.0
    scale = 1.0
    type = "login_box"

[shell]
avatar_path = "/home/wyn/Pictures/avatars/jeannedArc-riyo-zoom.jpg"
date_format = "%A, %Y %b %d"
font_family = "Maple Mono NF"
launch_apps_as_systemd_services = true
settings_show_advanced = true
telemetry_enabled = false
ui_scale = 1.1000000000000001

    [shell.panel]
    clipboard_placement = "attached"
    launcher_placement = "attached"
    open_near_click_control_center = true
    session_placement = "centered"
    shadow = false
    transparency_mode = "glass"

    [shell.screen_corners]
    enabled = true
    size = 40

    [shell.screenshot]
    directory = "/home/wyn/Pictures/Screenshots"

    [[shell.session.actions]]
    action = "lock"
    enabled = true
    shortcut = "1"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    enabled = true
    shortcut = "2"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    enabled = true
    glyph = "player-pause"
    label = "Suspend"
    shortcut = "3"
    variant = "default"

    [[shell.session.actions]]
    action = "command"
    command = "systemctl reboot --firmware-setup"
    enabled = true
    glyph = "cpu"
    label = "BIOS Reboot"
    shortcut = "4"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    enabled = true
    shortcut = "5"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    enabled = true
    shortcut = "6"
    variant = "destructive"

    [shell.shadow]
    alpha = 0.0

[system.monitor]
cpu_poll_seconds = 1
network_poll_seconds = 1

[theme]
custom_palette = "m3-content"
source = "wallpaper"
wallpaper_scheme = "m3-fruit-salad"

    [theme.templates]
    builtin_ids = [ "btop", "cava", "hyprland", "kitty" ]
    community_ids = [ "spicetify", "discord" ]

[wallpaper]
directory = "/home/wyn/Pictures/Wallpapers"

    [wallpaper.default]
    path = "/home/wyn/Pictures/Wallpapers/interlude_109.png"

    [wallpaper.last]
    path = "/home/wyn/Pictures/Wallpapers/interlude_109.png"

    [wallpaper.monitors.DP-5]
    path = "/home/wyn/Pictures/Wallpapers/interlude_109.png"

[weather]
address = "Fredericton, CA"

[widget.audio_visualizer]
centered = false

[widget.bongocat]
anchor = true
audio_spectrum = true
hot_reload = true
input_device = "/dev/input/event1"
scale = 1.3
script = "scripts/bongocat.lua"
tappy_mode = true
type = "scripted"

[widget.media]
hide_when_no_media = true
title_scroll = "always"

[widget.network]
show_label = false

[widget.screen_recorder]
hot_reload = true
script = "scripts/screen_recorder.lua"
type = "scripted"
video_source = "DP-5"

[widget.sysmon]
stat = "disk_pct"

[widget.tray]
drawer = true
hidden = [ "network", "blueman" ]