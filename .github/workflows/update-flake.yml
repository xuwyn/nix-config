name: update flake

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 6' # every Saturday at 00:00 UTC

jobs:
  nix-flake-update:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'xuwyn/nix-config' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Update .tack/pins.lock.json
        run: |
          log=$(GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} nix run nixpkgs#tack -- update)
          delim=$(openssl rand -hex 8)
          {
            echo "TACK_LOG<<$delim"
            echo "chore(flake): update pins.lock.json"
            echo ""
            echo "$log"
            echo "$delim"
          } >> $GITHUB_ENV
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [[ -n $(git status -s .tack/pins.lock.json) ]]; then
            git add .tack/pins.lock.json
            git commit -m "$TACK_LOG"
            git push origin main
          else
            echo "No changes detected, skipping commit."
          fi
